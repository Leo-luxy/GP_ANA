<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票分析系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/marked@5.0.0/marked.min.js"></script>
    <style>
        .card {
            margin-bottom: 20px;
        }
        .report-item {
            border: 1px solid #e9ecef;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .report-item:hover {
            background-color: #f8f9fa;
        }
        .spinner-border {
            margin-top: 20px;
        }
        .markdown-body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 16px;
            line-height: 1.5;
            color: #333;
            background-color: #fff;
            padding: 16px;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4, .markdown-body h5, .markdown-body h6 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
        }
        .markdown-body h1 {
            font-size: 2em;
        }
        .markdown-body h2 {
            font-size: 1.5em;
        }
        .markdown-body h3 {
            font-size: 1.25em;
        }
        .markdown-body p {
            margin-top: 0;
            margin-bottom: 16px;
        }
        .markdown-body ul, .markdown-body ol {
            margin-top: 0;
            margin-bottom: 16px;
            padding-left: 2em;
        }
        .markdown-body li {
            margin-top: 0.25em;
        }
        .markdown-body code {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
            font-size: 0.85em;
            padding: 0.2em 0.4em;
            margin: 0;
            background-color: rgba(27,31,35,0.05);
            border-radius: 3px;
        }
        .markdown-body pre {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
            font-size: 0.85em;
            padding: 16px;
            margin-top: 0;
            margin-bottom: 16px;
            background-color: #f6f8fa;
            border-radius: 6px;
            overflow: auto;
        }
        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
        }
        .markdown-body table {
            border-spacing: 0;
            border-collapse: collapse;
            margin-top: 0;
            margin-bottom: 16px;
        }
        .markdown-body table th, .markdown-body table td {
            padding: 6px 13px;
            border: 1px solid #dfe2e5;
        }
        .markdown-body table th {
            font-weight: 600;
            background-color: #f6f8fa;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-4">股票分析系统</h1>
        
        <!-- 功能按钮 -->
        <div class="mb-4">
            <button class="btn btn-primary me-2" onclick="showMainPage()">完整分析</button>
            <button class="btn btn-success me-2" onclick="showQuickAnalysis()">快速分析</button>
            <button class="btn btn-secondary me-2" onclick="showTradingRecords()">买卖记录管理</button>
            <button class="btn btn-info me-2" onclick="showDetailedMode()">详细模式</button>
            <button class="btn btn-warning me-2" onclick="showSingleFunction()">单功能执行</button>
            <button class="btn btn-danger me-2" onclick="showReportViewer()">报告查看</button>
            <button class="btn btn-dark" onclick="showBacktestPage()">策略回测</button>
        </div>
        
        <!-- 完整分析页面 -->
        <div class="card" id="main-page">
            <div class="card-body">
                <h5 class="card-title">完整分析（五维度两层决策）</h5>
                <p class="text-muted small">全量数据采集 → 财务+情绪+技术+股东+研报 → 冲突检测 → 交易计划</p>

                <!-- 股票代码输入 -->
                <div class="form-group">
                    <label for="stock-code" class="form-label">股票代码（6位数字）</label>
                    <input type="text" id="stock-code" class="form-control" placeholder="例如：300433">
                </div>

                <!-- 开始分析按钮 -->
                <button class="btn btn-primary mt-3" onclick="startAnalysis()">开始完整分析</button>
                
                <!-- 任务状态 -->
                <div id="task-status" class="mt-4" style="display: none;">
                    <h5>任务状态</h5>
                    <div id="status-content"></div>
                </div>
                
                <!-- 报告列表 -->
                <div id="report-list" class="mt-4" style="display: none;">
                    <h5>分析报告</h5>
                    <div id="reports-container-old"></div>
                </div>
                
                <!-- 报告内容 -->
                <div id="report-content-old" class="mt-4" style="display: none;">
                    <h5 id="report-title"></h5>
                    <div id="report-body"></div>
                    <button class="btn btn-secondary mt-3" onclick="showReportList()">返回报告列表</button>
                </div>
            </div>
        </div>
        
        <!-- 快速分析页面 -->
        <div class="card mt-4" id="quick-analysis" style="display: none;">
            <div class="card-body">
                <h5 class="card-title">快速分析</h5>
                
                <!-- 股票代码输入 -->
                <div class="form-group">
                    <label for="quick-stock-code" class="form-label">股票代码（6位数字）</label>
                    <input type="text" id="quick-stock-code" class="form-control" placeholder="例如：300433">
                </div>
                
                <!-- 每日更新 -->
                <input type="hidden" id="quick-analysis-type" value="daily">

                <!-- 策略模式选择 -->
                <div class="form-group mt-3">
                    <label class="form-label">策略模式</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="strategy-mode" id="strategy-short" value="short" checked>
                        <label class="form-check-label" for="strategy-short">短期交易</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="strategy-mode" id="strategy-medium" value="medium">
                        <label class="form-check-label" for="strategy-medium">中期持仓</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="strategy-mode" id="strategy-long" value="long">
                        <label class="form-check-label" for="strategy-long">长期投资</label>
                    </div>
                </div>
                
                <!-- 按钮组 -->
                <div class="mt-3 d-flex gap-2">
                    <button class="btn btn-success" onclick="startQuickAnalysis()">开始快速分析</button>
                    <button class="btn btn-secondary" onclick="showMainPage()">返回首页</button>
                </div>
                
                <!-- 任务状态 -->
                <div id="quick-task-status" class="mt-4" style="display: none;">
                    <h5>任务状态</h5>
                    <div id="quick-status-content"></div>
                </div>
                
                <!-- 分析结果 -->
                <div id="quick-report" class="mt-4" style="display: none;">
                    <h5>分析结果</h5>
                    <div id="quick-report-content"></div>
                </div>
            </div>
        </div>
        
        <!-- 买卖记录管理页面 -->
        <div class="card mt-4" id="trading-records" style="display: none;">
            <div class="card-body">
                <h5 class="card-title">买卖记录管理</h5>
                
                <!-- 股票代码输入 -->
                <div class="form-group">
                    <label for="trading-stock-code" class="form-label">股票代码（6位数字）</label>
                    <div class="input-group">
                        <input type="text" id="trading-stock-code" class="form-control" placeholder="例如：600313" value="603861">
                        <button class="btn btn-outline-secondary" onclick="loadTradingRecords()">查询记录</button>
                    </div>
                </div>
                
                <!-- 交易记录 -->
                <div class="mt-4">
                    <h6>交易记录</h6>
                    <div id="records-container"></div>
                </div>
                
                <!-- 添加交易记录 -->
                <div class="mt-4">
                    <h6>添加交易记录</h6>
                    <form onsubmit="event.preventDefault(); addTradingRecord();">
                        <div class="row">
                            <div class="col-md-3">
                                <label for="trade-date" class="form-label">日期</label>
                                <input type="date" id="trade-date" class="form-control" value="2026-03-14">
                            </div>
                            <div class="col-md-3">
                                <label for="trade-type" class="form-label">类型</label>
                                <select id="trade-type" class="form-control">
                                    <option value="buy">买入</option>
                                    <option value="sell">卖出</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label for="trade-price" class="form-label">价格</label>
                                <input type="number" id="trade-price" class="form-control" step="0.01" placeholder="价格">
                            </div>
                            <div class="col-md-3">
                                <label for="trade-shares" class="form-label">数量</label>
                                <input type="number" id="trade-shares" class="form-control" step="100" placeholder="数量">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success mt-3">添加记录</button>
                    </form>
                </div>
                
                <button class="btn btn-secondary mt-4" onclick="showMainPage()">返回首页</button>
            </div>
        </div>
        
        <!-- 详细模式 -->
        <div class="card mt-4" id="detailed-mode" style="display: none;">
            <div class="card-body">
                <h5 class="card-title">详细模式</h5>
                
                <!-- 功能选择 -->
                <div class="form-group">
                    <label for="detailed-function" class="form-label">功能选择</label>
                    <select id="detailed-function" class="form-control">
                        <option value="fetch_data">抓取特定数据</option>
                        <option value="query_data">查询特定数据</option>
                        <option value="analyze_data">分析特定数据</option>
                    </select>
                </div>
                
                <!-- 数据类型选择 -->
                <div class="form-group mt-3">
                    <label for="data-type" class="form-label">数据类型</label>
                    <select id="data-type" class="form-control">
                        <option value="periodic">低频数据（基本信息、财务数据等）</option>
                        <option value="daily">日更数据（价格、资金流等）</option>
                        <option value="performance">业绩预告与分红数据</option>
                        <option value="shareholder">股东数据</option>
                        <option value="industry">同行对比</option>
                    </select>
                </div>
                
                <!-- 股票代码输入 -->
                <div class="form-group mt-3">
                    <label for="detailed-stock-code" class="form-label">股票代码（6位数字）</label>
                    <input type="text" id="detailed-stock-code" class="form-control" placeholder="例如：600313">
                </div>
                
                <!-- 执行功能按钮 -->
                <button class="btn btn-primary mt-3" onclick="executeDetailedFunction()">执行功能</button>
                
                <!-- 执行结果 -->
                <div class="mt-4">
                    <h6>执行结果</h6>
                    <div id="detailed-result">请选择功能并执行</div>
                </div>
                
                <button class="btn btn-secondary mt-4" onclick="showMainPage()">返回首页</button>
            </div>
        </div>
        
        
        <!-- 报告查看器 -->
        <div class="card mt-4" id="report-viewer" style="display: none;">
            <div class="card-body">
                <h5 class="card-title">报告查看</h5>
                
                <!-- 股票列表 -->
                <div class="mt-4">
                    <h3>股票列表</h3>
                    <div id="stocks-container"></div>
                </div>
                
                <!-- 报告列表 -->
                <div id="report-list-new" class="mt-4" style="display: none;">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h3>报告列表</h3>
                        <button class="btn btn-secondary" onclick="showStocksList()">返回股票列表</button>
                    </div>
                    <div id="reports-container"></div>
                </div>
                
                <!-- 报告内容 -->
                <div id="report-content" class="mt-4" style="display: none;">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h3 id="current-report-name"></h3>
                        <button class="btn btn-secondary" onclick="showReportListNew()">返回报告列表</button>
                    </div>
                    <div id="content-container"></div>
                </div>
                
                <button class="btn btn-secondary mt-4" onclick="showMainPage()">返回首页</button>
            </div>
        </div>
        
        <!-- 策略回测页面 -->
        <div class="card mt-4" id="backtest-page" style="display: none;">
            <div class="card-body">
                <h5 class="card-title">策略回测</h5>
                
                <!-- 回测模式选择 -->
                <div class="form-group mt-3">
                    <label class="form-label">回测模式</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="backtest-mode" id="backtest-full" value="full" checked>
                        <label class="form-check-label" for="backtest-full">完整流程（数据更新+回测+报告）</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="backtest-mode" id="backtest-quick" value="quick">
                        <label class="form-check-label" for="backtest-quick">快速回测（仅回测+报告）</label>
                    </div>
                </div>
                
                <!-- 策略版本选择 -->
                <div class="form-group mt-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="use-simplified" value="simplified">
                        <label class="form-check-label" for="use-simplified">使用简化版策略（MA5 > MA20）</label>
                        <small class="form-text text-muted">不勾选则使用完整版策略（MA5 > MA10 > MA20 > MA60）</small>
                    </div>
                </div>
                
                <!-- 运行回测按钮 -->
                <button class="btn btn-dark mt-3" onclick="runBacktest()">开始策略回测</button>
                
                <!-- 任务状态 -->
                <div id="backtest-task-status" class="mt-4" style="display: none;">
                    <h5>回测任务状态</h5>
                    <div id="backtest-status-content"></div>
                </div>
                
                <!-- 监控报告 -->
                <div id="backtest-report" class="mt-4" style="display: none;">
                    <h5>监控报告</h5>
                    <div id="backtest-report-content"></div>
                </div>
                
                <!-- 股票列表 -->
                <div id="backtest-stock-list" class="mt-4" style="display: none;">
                    <h5>股票回测图表</h5>
                    <div id="backtest-stocks-container"></div>
                </div>
                
                <!-- 图表查看模态框 -->
                <div class="modal fade" id="chartModal" tabindex="-1" aria-labelledby="chartModalLabel" aria-hidden="true">
                    <div class="modal-dialog modal-lg">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" id="chartModalLabel">回测图表</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <div class="modal-body">
                                <img id="chartImage" src="" class="img-fluid" alt="回测图表">
                            </div>
                        </div>
                    </div>
                </div>
                
                <button class="btn btn-secondary mt-4" onclick="showMainPage()">返回首页</button>
            </div>
        </div>
        
        <!-- 单功能执行 -->
        <div class="card mt-4" id="single-function" style="display: none;">
            <div class="card-body">
                <h5 class="card-title">单功能执行</h5>
                
                <!-- 功能分类选择 -->
                <div class="form-group">
                    <label for="function-category" class="form-label">功能分类</label>
                    <select id="function-category" class="form-control" onchange="updateProgramList()">
                        <option value="analysis">分析程序</option>
                        <option value="calculation">计算程序</option>
                        <option value="fetch">抓取程序</option>
                    </select>
                </div>
                
                <!-- 程序选择 -->
                <div class="form-group mt-3">
                    <label for="program-select" class="form-label">程序选择</label>
                    <select id="program-select" class="form-control">
                        <!-- 程序列表将通过JavaScript动态更新 -->
                    </select>
                </div>
                
                <!-- 股票代码输入 -->
                <div class="form-group mt-3">
                    <label for="single-function-stock-code" class="form-label">股票代码（6位数字）</label>
                    <input type="text" id="single-function-stock-code" class="form-control" placeholder="例如：600313">
                </div>
                
                <!-- 执行按钮 -->
                <button class="btn btn-primary mt-3" onclick="executeSingleFunction()">执行程序</button>
                
                <!-- 执行结果 -->
                <div class="mt-4">
                    <h6>执行结果</h6>
                    <div id="single-function-result">请选择程序并执行</div>
                </div>
                
                <button class="btn btn-secondary mt-4" onclick="showMainPage()">返回首页</button>
            </div>
        </div>
    </div>
    
    <!-- 版本信息 -->
    <div class="container mt-4 mb-4">
        <div class="text-center text-muted">
            <p>版本：v1.2.0 | 修改日期：2026-05-07</p>
        </div>
    </div>
    
    <script>
        // 页面切换函数
        function showMainPage() {
            document.getElementById('quick-analysis').style.display = 'none';
            document.getElementById('trading-records').style.display = 'none';
            document.getElementById('detailed-mode').style.display = 'none';
            document.getElementById('single-function').style.display = 'none';
            document.getElementById('report-viewer').style.display = 'none';
            document.getElementById('main-page').style.display = 'block';
        }
        
        function showQuickAnalysis() {
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('trading-records').style.display = 'none';
            document.getElementById('detailed-mode').style.display = 'none';
            document.getElementById('single-function').style.display = 'none';
            document.getElementById('report-viewer').style.display = 'none';
            document.getElementById('quick-analysis').style.display = 'block';
        }
        
        function showTradingRecords() {
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('quick-analysis').style.display = 'none';
            document.getElementById('detailed-mode').style.display = 'none';
            document.getElementById('report-viewer').style.display = 'none';
            document.getElementById('trading-records').style.display = 'block';
            loadTradingRecords();
        }
        
        function showDetailedMode() {
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('quick-analysis').style.display = 'none';
            document.getElementById('trading-records').style.display = 'none';
            document.getElementById('report-viewer').style.display = 'none';
            document.getElementById('detailed-mode').style.display = 'block';
        }
        
        
        function showReportViewer() {
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('quick-analysis').style.display = 'none';
            document.getElementById('trading-records').style.display = 'none';
            document.getElementById('detailed-mode').style.display = 'none';
            document.getElementById('single-function').style.display = 'none';
            document.getElementById('report-viewer').style.display = 'block';
            loadStocks();
        }
        
        function showSingleFunction() {
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('quick-analysis').style.display = 'none';
            document.getElementById('trading-records').style.display = 'none';
            document.getElementById('detailed-mode').style.display = 'none';
            document.getElementById('report-viewer').style.display = 'none';
            document.getElementById('single-function').style.display = 'block';
            updateProgramList();
        }
        
        // 股票分析相关函数
        function startAnalysis() {
            const stockCode = document.getElementById('stock-code').value.trim();

            if (!stockCode || stockCode.length !== 6 || !/^\d+$/.test(stockCode)) {
                alert('请输入6位数字的股票代码');
                return;
            }

            // 显示任务状态
            document.getElementById('task-status').style.display = 'block';
            document.getElementById('status-content').innerHTML = '<div class="text-center"><div class="spinner-border" role="status"><span class="sr-only">处理中...</span></div></div>';

            // 发送分析请求（完整分析，仅 init）
            fetch('/api/analyze', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ stock_code: stockCode })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // 轮询任务状态
                    pollTaskStatus(data.task_id);
                } else {
                    document.getElementById('status-content').innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
                }
            })
            .catch(error => {
                document.getElementById('status-content').innerHTML = `<div class="alert alert-danger">请求失败：${error.message}</div>`;
            });
        }
        
        function pollTaskStatus(taskId) {
            const statusContent = document.getElementById('status-content');
            
            fetch(`/api/task_status/${taskId}`)
            .then(response => response.json())
            .then(data => {
                if (data.status === 'running') {
                    // 显示进度和消息
                    let progress = data.progress || 0;
                    let messages = data.messages || [];
                    let messageHtml = messages.map(msg => `<div>${msg}</div>`).join('');
                    statusContent.innerHTML = `
                        <div class="progress mb-3">
                            <div class="progress-bar" role="progressbar" style="width: ${progress}%" aria-valuenow="${progress}" aria-valuemin="0" aria-valuemax="100">${progress}%</div>
                        </div>
                        <div class="border p-3" style="max-height: 500px; overflow-y: auto;" id="message-container">
                            ${messageHtml}
                        </div>
                    `;
                    // 自动滚动到最新内容
                    setTimeout(() => {
                        const messageContainer = document.getElementById('message-container');
                        if (messageContainer) {
                            messageContainer.scrollTop = messageContainer.scrollHeight;
                        }
                    }, 100);
                    // 继续轮询
                    setTimeout(() => pollTaskStatus(taskId), 2000);
                } else if (data.status === 'completed') {
                    // 任务完成，显示报告列表
                    statusContent.innerHTML = `<div class="alert alert-success">任务完成！</div>`;
                    setTimeout(() => {
                        document.getElementById('task-status').style.display = 'none';
                        loadReports();
                    }, 1000);
                } else if (data.status === 'failed') {
                    // 任务失败
                    let messages = data.messages || [];
                    let messageHtml = messages.map(msg => `<div>${msg}</div>`).join('');

        function pollQuickTaskStatus(taskId, stockCode) {
            const statusContent = document.getElementById('quick-status-content');
            
            fetch(`/api/quick_task_status/${taskId}`)
            .then(response => response.json())
            .then(data => {
                if (data.status === 'running') {
                    // 显示进度和消息
                    let progress = data.progress || 0;
                    let messages = data.messages || [];
                    let messageHtml = messages.map(msg => `<div>${msg}</div>`).join('');
                    statusContent.innerHTML = `
                        <div class="progress mb-3">
                            <div class="progress-bar bg-success" role="progressbar" style="width: ${progress}%" aria-valuenow="${progress}" aria-valuemin="0" aria-valuemax="100">${progress}%</div>
                        </div>
                        <div class="border p-3" style="max-height: 500px; overflow-y: auto;" id="quick-message-container">
                            ${messageHtml}
                        </div>
                    `;
                    // 自动滚动到最新内容
                    setTimeout(() => {
                        const messageContainer = document.getElementById('quick-message-container');
                        if (messageContainer) {
                            messageContainer.scrollTop = messageContainer.scrollHeight;
                        }
                    }, 100);
                    // 继续轮询
                    setTimeout(() => pollQuickTaskStatus(taskId, stockCode), 2000);
                } else if (data.status === 'completed') {
                    // 任务完成，显示分析结果
                    statusContent.innerHTML = `<div class="alert alert-success">任务完成！</div>`;

                    let messageHtml = messages.map(msg => `<div>${msg}</div>`).join('');

                } else if (data.status === 'pending') {
                    // 任务正在等待处理

                    statusContent.innerHTML = `

                        <div class="border p-3" style="max-height: 500px; overflow-y: auto;" id="quick-message-container">

                        </div>

        function addTradingRecord() {
            const stockCode = document.getElementById('trading-stock-code').value.trim();
            const date = document.getElementById('trade-date').value;
            const type = document.getElementById('trade-type').value;
            const price = parseFloat(document.getElementById('trade-price').value);
            const shares = parseInt(document.getElementById('trade-shares').value);
            
            if (!stockCode || stockCode.length !== 6 || !/^\d+$/.test(stockCode)) {
                alert('请输入6位数字的股票代码');
                return;
            }
            
            if (!date || !type || isNaN(price) || price <= 0 || isNaN(shares) || shares <= 0) {
                alert('请填写完整的交易信息');
                return;
            }
            
            fetch('/api/add_trading_record', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    stock_code: stockCode, 
                    date: date, 
                    type: type, 
                    price: price, 
                    shares: shares 
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('交易记录添加成功');
                    // 清空表单
                    document.getElementById('trade-date').value = '';
                    document.getElementById('trade-price').value = '';
                    document.getElementById('trade-shares').value = '';
                    // 重新加载交易记录
                    loadTradingRecords();
                } else {
                    alert('添加失败：' + data.message);
                }
            })
            .catch(error => {
                alert('添加失败：' + error.message);
            });
        }

                    { value: 'eastmoney_fetcher.py --type dupont', label: 'eastmoney_fetcher.py --type dupont - 杜邦分析行业排名' },
                    { value: 'data_collector.py', label: 'data_collector.py - 通用数据收集器' },
                    { value: 'em_financial_collector.py', label: 'em_financial_collector.py - 东方财富财务数据' },
                    { value: 'important_missing_data_collector.py', label: 'important_missing_data_collector.py - 重要缺失数据' },
                    { value: 'check_data_updates.py', label: 'check_data_updates.py - 统一数据更新检查' }
                ];
            }
            
            // 添加程序选项
            programs.forEach(program => {
                const option = document.createElement('option');
                option.value = program.value;
                option.textContent = program.label;
                programSelect.appendChild(option);
            });
        }
        
        function executeSingleFunction() {
            const category = document.getElementById('function-category').value;
            const program = document.getElementById('program-select').value;
            const stockCode = document.getElementById('single-function-stock-code').value.trim();
            
            if (!stockCode || stockCode.length !== 6 || !/^\d+$/.test(stockCode)) {
                alert('请输入6位数字的股票代码');
                return;
            }
            
            // 显示加载状态
            document.getElementById('single-function-result').innerHTML = '<div class="text-center"><div class="spinner-border" role="status"><span class="sr-only">处理中...</span></div></div>';
            
            fetch('/api/execute_single_function', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    category: category, 
                    program: program, 
                    stock_code: stockCode 
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // 尝试渲染Markdown格式
                    try {
                        const markdownOutput = marked.parse(data.output);
                        document.getElementById('single-function-result').innerHTML = `<div class="alert alert-success">程序执行成功</div><div class="markdown-body">${markdownOutput}</div>`;
                    } catch (e) {
                        // 如果渲染失败，使用原始文本
                        document.getElementById('single-function-result').innerHTML = `<div class="alert alert-success">程序执行成功</div><pre>${data.output}</pre>`;
                    }
                } else {
                    // 错误信息也尝试渲染Markdown
                    try {
                        const markdownError = marked.parse(data.error);
                        document.getElementById('single-function-result').innerHTML = `<div class="alert alert-danger">${data.message}</div><div class="markdown-body">${markdownError}</div>`;
                    } catch (e) {
                        // 如果渲染失败，使用原始文本
                        document.getElementById('single-function-result').innerHTML = `<div class="alert alert-danger">${data.message}</div><pre>${data.error}</pre>`;
                    }
                }
            })
            .catch(error => {
                document.getElementById('single-function-result').innerHTML = `<div class="alert alert-danger">执行失败：${error.message}</div>`;
            });
        }
        
        // 策略回测相关函数
        function showBacktestPage() {
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('quick-analysis').style.display = 'none';
            document.getElementById('trading-records').style.display = 'none';
            document.getElementById('detailed-mode').style.display = 'none';
            document.getElementById('single-function').style.display = 'none';
            document.getElementById('report-viewer').style.display = 'none';
            document.getElementById('backtest-page').style.display = 'block';
            
            // 加载已有的监控报告和股票列表
            loadBacktestReport();
            loadBacktestStockList();
        }
        
        function runBacktest() {
            // 获取用户选择的回测模式
            const backtestMode = document.querySelector('input[name="backtest-mode"]:checked').value;
            const skipDataUpdate = backtestMode === 'quick';
            
            // 获取用户选择的策略版本
            const useSimplified = document.getElementById('use-simplified').checked;
            
            // 显示任务状态
            document.getElementById('backtest-task-status').style.display = 'block';
            document.getElementById('backtest-status-content').innerHTML = '<div class="text-center"><div class="spinner-border" role="status"><span class="sr-only">处理中...</span></div></div>';
            
            // 发送回测请求
            fetch('/api/backtest/run_backtest', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    skip_data_update: skipDataUpdate,
                    use_simplified: useSimplified
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    pollBacktestStatus(data.task_id);
                } else {
                    document.getElementById('backtest-status-content').innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
                }
            })
            .catch(error => {
                document.getElementById('backtest-status-content').innerHTML = `<div class="alert alert-danger">请求失败：${error.message}</div>`;
            });
        }
        
        function pollBacktestStatus(taskId) {
            const statusContent = document.getElementById('backtest-status-content');
            
            fetch(`/api/backtest/task_status/${taskId}`)
            .then(response => response.json())
            .then(data => {
                if (data.status === 'running') {
                    let progress = data.progress || 0;
                    let messages = data.messages || [];
                    let messageHtml = messages.map(msg => `<div>${msg}</div>`).join('');
                    statusContent.innerHTML = `
                        <div class="progress mb-3">
                            <div class="progress-bar bg-dark" role="progressbar" style="width: ${progress}%" aria-valuenow="${progress}" aria-valuemin="0" aria-valuemax="100">${progress}%</div>
                        </div>
                        <div class="border p-3" style="max-height: 500px; overflow-y: auto;" id="backtest-message-container">
                            ${messageHtml}
                        </div>
                    `;
                    setTimeout(() => {
                        const messageContainer = document.getElementById('backtest-message-container');
                        if (messageContainer) {
                            messageContainer.scrollTop = messageContainer.scrollHeight;
                        }
                    }, 100);
                    setTimeout(() => pollBacktestStatus(taskId), 2000);
                } else if (data.status === 'completed') {
                    statusContent.innerHTML = `<div class="alert alert-success">回测完成！</div>`;
                    setTimeout(() => {
                        document.getElementById('backtest-task-status').style.display = 'none';
                        loadBacktestReport();
                        loadBacktestStockList();
                    }, 1000);
                } else if (data.status === 'failed') {
                    let messages = data.messages || [];
                    let messageHtml = messages.map(msg => `<div>${msg}</div>`).join('');
                    statusContent.innerHTML = `<div class="alert alert-danger">回测失败：<br>${messageHtml}</div>`;
                } else if (data.status === 'pending') {
                    let messages = data.messages || [];
                    let messageHtml = messages.map(msg => `<div>${msg}</div>`).join('');
                    statusContent.innerHTML = `
                        <div class="progress mb-3">
                            <div class="progress-bar bg-dark" role="progressbar" style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">等待处理...</div>
                        </div>
                        <div class="border p-3" style="max-height: 500px; overflow-y: auto;" id="backtest-message-container">
                            ${messageHtml}
                        </div>
                    `;
                    setTimeout(() => pollBacktestStatus(taskId), 2000);
                } else {
                    statusContent.innerHTML = `<div class="alert alert-warning">任务不存在</div>`;
                }
            })
            .catch(error => {
                statusContent.innerHTML = `<div class="alert alert-danger">获取状态失败：${error.message}</div>`;
            });
        }
        
        function loadBacktestReport() {
            fetch('/api/backtest/get_report')
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    const htmlContent = marked.parse(data.content);
                    document.getElementById('backtest-report-content').innerHTML = `<div class="markdown-body">${htmlContent}</div>`;
                    document.getElementById('backtest-report').style.display = 'block';
                } else {
                    document.getElementById('backtest-report-content').innerHTML = `<div class="alert alert-info">${data.message}</div>`;
                    document.getElementById('backtest-report').style.display = 'block';
                }
            })
            .catch(error => {
                document.getElementById('backtest-report-content').innerHTML = `<div class="alert alert-danger">加载报告失败：${error.message}</div>`;
            });
        }
        
        function loadBacktestStockList() {
            fetch('/api/backtest/get_stock_list')
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    let stocksHtml = '';
                    if (data.stocks.length === 0) {
                        stocksHtml = '<div class="alert alert-info">暂无回测数据</div>';
                    } else {
                        stocksHtml = '<div class="row">';
                        data.stocks.forEach(stock => {
                            stocksHtml += `
                                <div class="col-md-3 mb-3">
                                    <div class="card" style="cursor: pointer;" onclick="viewBacktestChart('${stock.chart_path}')">
                                        <div class="card-body text-center">
                                            <h6>${stock.ticker}</h6>
                                            <p class="text-muted small">点击查看回测图表</p>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                        stocksHtml += '</div>';
                    }
                    document.getElementById('backtest-stocks-container').innerHTML = stocksHtml;
                    document.getElementById('backtest-stock-list').style.display = 'block';
                } else {
                    document.getElementById('backtest-stocks-container').innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
                }
            })
            .catch(error => {
                document.getElementById('backtest-stocks-container').innerHTML = `<div class="alert alert-danger">加载股票列表失败：${error.message}</div>`;
            });
        }
        
        function viewBacktestChart(chartPath) {
            const imgUrl = `/api/backtest/get_chart/${chartPath}`;
            document.getElementById('chartImage').src = imgUrl;
            document.getElementById('chartModalLabel').textContent = chartPath.split('/')[0] + ' 回测图表';
            
            const modal = new bootstrap.Modal(document.getElementById('chartModal'));
            modal.show();
        }
    </script>
</body>
</html>
